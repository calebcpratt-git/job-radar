# ─────────────────────────────────────────────────────────────
#  Job Radar — tuned for: Product Operations, NYC, 1–5 yrs,
#  tech companies + internal digital-product roles.
# ─────────────────────────────────────────────────────────────

label: "Caleb's Get Rich Radar"

location: "New York"
# Other ways postings phrase "New York" that a plain "New York" substring
# check misses — boroughs and common abbreviations. Matched as whole
# words/phrases (see location_ok() in job_check.py), not a raw substring,
# so short entries like "queens" don't false-match inside an unrelated word
# like "Queensland".
location_aliases:
  - "new york"
  - "new york city"
  - "nyc"
  - "manhattan"
  - "brooklyn"
  - "queens"
  - "bronx"
  - "staten island"
remote_ok: true
max_days_old: 30

# Named companies tracked via their public ATS boards (Ashby, Workable,
# Greenhouse, Lever, Rippling, Gem, Work at a Startup). Company list and ATS
# type live in ats_map.csv, not here — see ats_fetch.py. `csv` lets you point
# at a different file; omit it to use ats_map.csv in the repo root.
ats_map:
  enabled: true
  # csv: "ats_map.csv"

# Broad search across job boards (Adzuna). `what_or` (the server-side
# keyword search) is no longer set here — job_check.py derives it from
# title_rules below, so the two never drift out of sync.
adzuna:
  enabled: true
  country: "us"
  results_per_page: 50
  pages: 2

# Broad search via JSearch (Google for Jobs — surfaces LinkedIn, Indeed,
# Glassdoor, etc). Free tier is ~200 calls/month. Each query is 1 API call
# regardless of `pages` (the API bundles that many pages of results into
# one response) — so call cost scales with the number of queries, not
# pages. Keep the query list short; one daily run = len(queries) calls.
# The query field is natural-language-only (confirmed empirically) — it
# does not support OR/boolean syntax, so broadening coverage means adding
# more short, plain-language queries here, not combining terms into one.
jsearch:
  enabled: true
  queries:
    - "product operations in new york"
    - "operations manager in new york"
    - "forward deployed implementation manager in new york"
    - "customer success solutions consultant in new york"
  pages: 10           # pages of results per query, returned in one call
  country: "us"

# Keep a posting only if its description mentions at least one of these
# (case-insensitive). Filters out physical-product ops (manufacturing,
# CPG, logistics) in favor of software/digital product roles.
# Jobs with no description available are kept.
digital_signals:
  - software
  - saas
  - platform
  - app
  - api
  - digital
  - internal tools
  - internal tooling
  - engineering
  - product manager
  - product management
  - roadmap
  - agile
  - sprint
  - cross-functional
  - user experience
  - ux

# Title filter: a job passes if its title matches ANY rule below.
# A rule matches when ALL of its words appear in the title as whole
# words (case-insensitive). A single-word rule (e.g. [implementation],
# [bizops]) matches on that word alone, so it casts a much wider net
# than a two-word AND rule — expect more noise from those specifically.
title_rules:
  # existing
  - [product, operations]
  - [product, ops]
  - [platform, operations]
  - [business, operations]
  - [strategy, operations]
  - [revenue, operations]
  - [product, analyst]
  # product strategy & analytics
  - [product, strategy]
  - [product, analytics]
  - [product, specialist]
  # deployment / forward-deployed
  - [deployment, strategist]
  - [deployment, manager]
  - [deployment, associate]
  - [deployment, specialist]
  - [deployment, lead]
  - [forward, deployed]
  - [deployed, intelligence]
  # implementation
  - [implementation]
  # customer success & post-sale
  - [customer, success]
  - [customer, operations]
  - [onboarding, manager]
  - [onboarding, specialist]
  - [engagement, manager]
  - [engagement, associate]
  # solutions (non-engineering variants)
  - [solutions, consultant]
  - [solutions, associate]
  - [solutions, specialist]
  # generalist ops
  - [gtm, operations]
  - [gtm, ops]
  - [sales, operations]
  - [growth, operations]
  - [bizops]
  - [chief, staff]
